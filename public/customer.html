<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevRev Object Explorer - Customer View</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 42' fill='none'%3E%3Cpath d='M10.4544 9.96464V19.9293C4.88066 19.9293 0.293945 15.4307 0.293945 9.96464C0.293945 4.4986 4.88066 0 10.4544 0C16.0281 0 20.6148 4.4986 20.6148 9.96464H10.4544Z' fill='%23FFE600'/%3E%3Cpath d='M29.0296 31.242V41.2066C23.4559 41.2066 18.8691 36.708 18.8691 31.242C18.8691 25.7759 23.4559 21.2773 29.0296 21.2773C34.6033 21.2773 39.19 25.7759 39.19 31.242H29.0296Z' fill='%23FFE600'/%3E%3Cpath d='M29.0259 19.6418L39.4767 0.292969H18.5752L29.0259 19.6418Z' fill='%23FFE600'/%3E%3Cpath d='M10.4507 40.9211L20.9015 21.5723H0L10.4507 40.9211Z' fill='%23FFE600'/%3E%3C/svg%3E">
<style>
@font-face{font-family:'Chip Display';src:url('/fonts/ChipDisp-Bold.otf') format('opentype');font-weight:700}
@font-face{font-family:'Chip Text';src:url('/fonts/ChipText-Regular.otf') format('opentype');font-weight:400}
@font-face{font-family:'Chip Text';src:url('/fonts/ChipText-Medium.otf') format('opentype');font-weight:500}
@font-face{font-family:'Chip Mono';src:url('/fonts/ChipMono-Medium.otf') format('opentype');font-weight:500}

:root{--n100:#FFFFFF;--n600:#A5A2A4;--n700:#7A7579;--n800:#514C4F;--n900:#3E3C3D;--n1000:#302E2F;--n1100:#211F20;--n1200:#191616;--n1300:#161616;--y400:#FFE600;--blue:#3968F6;--purple:#8854F6;--green:#7ADB12;--orange:#F35106;--red:#C90651}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Chip Text',system-ui,sans-serif;background:var(--n1300);color:var(--n100);min-height:100vh;letter-spacing:-0.015em}

/* Auth gate */
.auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px}
.auth-gate.hidden{display:none}
.auth-box{background:var(--n1200);border:1px solid var(--n1000);border-radius:16px;padding:40px;max-width:420px;width:100%;text-align:center}
.auth-box h1{font-family:'Chip Display',system-ui,sans-serif;font-size:28px;margin-bottom:8px}
.auth-box h1 span{color:var(--y400)}
.auth-box p{color:var(--n700);font-size:14px;margin-bottom:24px}
.auth-input{width:100%;padding:12px 16px;border-radius:9999px;border:1px solid var(--n900);background:var(--n1100);color:var(--n100);font-family:'Chip Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s ease;margin-bottom:12px}
.auth-input:focus{border-color:var(--y400)}
.auth-input::placeholder{color:var(--n800)}
.auth-btn{width:100%;padding:12px;border-radius:9999px;border:none;background:var(--y400);color:var(--n1300);font-family:'Chip Display',system-ui,sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s ease}
.auth-btn:hover{box-shadow:0 4px 16px rgba(255,230,0,0.3)}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{color:var(--red);font-size:12px;margin-top:12px;display:none}
.auth-error.visible{display:block}

/* Loading state */
.loading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px}
.loading.visible{display:flex}
.loading-spinner{width:32px;height:32px;border:3px solid var(--n1000);border-top-color:var(--y400);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Chip Mono',monospace;font-size:12px;color:var(--n700);text-transform:uppercase}

/* Results */
.results{display:none;min-height:100vh}
.results.visible{display:block}
.results-header{padding:16px 32px;border-bottom:1px solid var(--n1000);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(22,22,22,0.95);backdrop-filter:blur(16px);z-index:100}
.results-header-left{display:flex;align-items:center;gap:12px}
.results-org{font-family:'Chip Display',system-ui,sans-serif;font-size:18px}
.results-org span{color:var(--y400)}
.results-badge{font-family:'Chip Mono',monospace;font-size:10px;padding:3px 10px;border-radius:9999px;background:var(--n1100);border:1px solid var(--n1000);color:var(--n700);text-transform:uppercase}
.results-back{font-family:'Chip Mono',monospace;font-size:11px;padding:6px 14px;border-radius:9999px;background:var(--n1100);border:1px solid var(--n900);color:var(--n700);cursor:pointer;text-decoration:none;transition:all 0.2s ease}
.results-back:hover{border-color:var(--y400);color:var(--y400)}

.results-body{padding:32px;max-width:1200px;margin:0 auto}
.results-stats{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
.stat-card{background:var(--n1200);border:1px solid var(--n1000);border-radius:10px;padding:12px 16px;min-width:120px}
.stat-num{font-family:'Chip Display',system-ui,sans-serif;font-size:24px;font-weight:700;color:var(--y400)}
.stat-label{font-family:'Chip Mono',monospace;font-size:10px;color:var(--n700);text-transform:uppercase;margin-top:2px}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.cat-card{background:var(--n1200);border:1px solid var(--n1000);border-radius:12px;padding:16px}
.cat-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--n1000)}
.cat-card-dot{width:6px;height:6px;border-radius:50%}
.cat-card-title{font-family:'Chip Mono',monospace;font-size:11px;text-transform:uppercase;color:var(--n600)}
.cat-card-count{margin-left:auto;font-family:'Chip Mono',monospace;font-size:10px;color:var(--n800)}
.cat-objects{display:flex;flex-direction:column;gap:4px}
.cat-obj{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;transition:background 0.15s ease}
.cat-obj:hover{background:var(--n1100)}
.cat-obj-type{font-family:'Chip Mono',monospace;font-size:9px;padding:2px 6px;border-radius:9999px;background:var(--n1100);color:var(--n700);text-transform:uppercase;flex-shrink:0}
.cat-obj-name{font-size:13px;font-weight:500;color:var(--n100);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-obj-desc{font-size:11px;color:var(--n800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:auto}

/* Relationships section */
.rel-section{margin-top:32px}
.rel-title{font-family:'Chip Mono',monospace;font-size:11px;text-transform:uppercase;color:var(--n700);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rel-title::after{content:'';flex:1;height:1px;background:var(--n1000)}
.rel-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
.rel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--n1200);border:1px solid var(--n1000);font-size:11px}
.rel-from,.rel-to{color:var(--n100);font-weight:500}
.rel-label{color:var(--n800);font-style:italic}
.rel-arrow{color:var(--green)}
</style>
</head>
<body>

<!-- Auth Gate -->
<div class="auth-gate" id="auth-gate">
<div class="auth-box">
<h1>Customer <span>Explorer</span></h1>
<p>Enter a DevRev PAT to discover and visualize the customer's object model</p>
<input type="password" class="auth-input" id="pat-input" placeholder="Paste DevRev PAT here (don:secret:...)">
<button class="auth-btn" id="discover-btn" onclick="discover()">Discover Object Model</button>
<div class="auth-error" id="auth-error"></div>
</div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
<div class="loading-spinner"></div>
<div class="loading-text">Discovering object model...</div>
</div>

<!-- Results -->
<div class="results" id="results">
<div class="results-header">
<div class="results-header-left">
<div class="results-org" id="results-org"></div>
<span class="results-badge">Live Discovery</span>
</div>
<a class="results-back" onclick="reset()">New Discovery</a>
</div>
<div class="results-body">
<div class="results-stats" id="results-stats"></div>
<div class="cat-grid" id="cat-grid"></div>
<div class="rel-section" id="rel-section"></div>
</div>
</div>

<script>
async function discover() {
  const pat = document.getElementById('pat-input').value.trim();
  if (!pat) return;

  const btn = document.getElementById('discover-btn');
  const error = document.getElementById('auth-error');
  btn.disabled = true;
  error.classList.remove('visible');

  // Show loading
  document.getElementById('auth-gate').classList.add('hidden');
  document.getElementById('loading').classList.add('visible');

  try {
    const res = await fetch('/api/discover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pat }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Discovery failed');
    }

    renderResults(data);
  } catch (err) {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('auth-gate').classList.remove('hidden');
    error.textContent = err.message;
    error.classList.add('visible');
    btn.disabled = false;
  }
}

function renderResults(data) {
  document.getElementById('loading').classList.remove('visible');
  document.getElementById('results').classList.add('visible');

  // Org name
  document.getElementById('results-org').innerHTML = `<span>${data.orgName}</span> Object Model`;

  // Update URL
  const slug = data.orgName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
  window.history.replaceState({}, '', `/customer/${slug}`);

  // Stats
  const stats = data.model.stats;
  const statsHtml = [
    { num: data.model.categories.length, label: 'Categories' },
    { num: data.model.categories.reduce((s, c) => s + c.objects.length, 0), label: 'Objects' },
    { num: data.model.relationships.length, label: 'Relationships' },
    { num: stats.totalSyncUnits, label: 'Sync Units' },
    { num: stats.totalAccounts, label: 'Accounts' },
  ].map(s => `<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
  document.getElementById('results-stats').innerHTML = statsHtml;

  // Categories
  const catHtml = data.model.categories.map(cat => `
    <div class="cat-card">
      <div class="cat-card-header">
        <div class="cat-card-dot" style="background:${cat.color}"></div>
        <span class="cat-card-title">${cat.label}</span>
        <span class="cat-card-count">${cat.objects.length}</span>
      </div>
      <div class="cat-objects">
        ${cat.objects.slice(0, 12).map(obj => `
          <div class="cat-obj">
            <span class="cat-obj-type">${obj.type}</span>
            <span class="cat-obj-name">${obj.name}</span>
            ${obj.desc ? `<span class="cat-obj-desc">${obj.desc}</span>` : ''}
          </div>
        `).join('')}
        ${cat.objects.length > 12 ? `<div style="font-size:11px;color:var(--n800);padding:4px 8px">+${cat.objects.length - 12} more</div>` : ''}
      </div>
    </div>
  `).join('');
  document.getElementById('cat-grid').innerHTML = catHtml;

  // Relationships
  if (data.model.relationships.length) {
    const relHtml = `
      <div class="rel-title">Discovered Relationships</div>
      <div class="rel-list">
        ${data.model.relationships.slice(0, 30).map(r => `
          <div class="rel-item">
            <span class="rel-from">${truncate(r.from)}</span>
            <span class="rel-arrow">→</span>
            <span class="rel-label">${r.label}</span>
            <span class="rel-arrow">→</span>
            <span class="rel-to">${truncate(r.to)}</span>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('rel-section').innerHTML = relHtml;
  }
}

function truncate(str) {
  if (!str) return '';
  if (str.length > 24) return str.slice(0, 24) + '...';
  return str;
}

function reset() {
  document.getElementById('results').classList.remove('visible');
  document.getElementById('auth-gate').classList.remove('hidden');
  document.getElementById('pat-input').value = '';
  document.getElementById('discover-btn').disabled = false;
  window.history.replaceState({}, '', '/customer');
}

// Allow Enter key to submit
document.getElementById('pat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') discover();
});
</script>
</body>
</html>
